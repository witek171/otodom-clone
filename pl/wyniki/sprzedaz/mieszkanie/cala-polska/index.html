<!DOCTYPE html>
<html>
<head>
    <title>Otodom Mock Router</title>
    <script>
        // 1. Pobieramy parametry z URL
        const urlParams = new URLSearchParams(window.location.search);
        let page = urlParams.get('page');

        // 2. Logika wyboru pliku:
        // Jeśli w URL nie ma "page" (czyli strona 1), ustawiamy '1'
        if (!page) {
            page = '1';
        }

        // 3. Przekierowanie do folderu z plikami statycznymi
        // Twoje pliki powinny leżeć w folderze /pages/ i nazywać się 1.html, 2.html itd.
        window.location.href = "pages/" + page + ".html";
    </script>
</head>
<body>
    <p>Ładowanie wyników wyszukiwania dla strony: <b><span id="displayPage"></span></b>...</p>
    <script>
        document.getElementById('displayPage').innerText = 
            (new URLSearchParams(window.location.search).get('page') || '1');
    </script>
</body>
</html>
