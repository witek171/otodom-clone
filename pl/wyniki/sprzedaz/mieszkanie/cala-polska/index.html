<!DOCTYPE html>
<html>
<head>
    <title>Router</title>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let page = urlParams.get('page') || '1';

        // Skoro Twoje pliki są w folderze "pages" względem tego pliku:
        window.location.href = "pages/" + page + ".html";
    </script>
</head>
<body>
    <p>Przekierowywanie do strony danych...</p>
</body>
</html>
